<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>ShapeLens AR - 立体展開</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  body { font-family: 'Noto Sans JP', sans-serif; background: #000; color: #e2e8f0; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
  #bgVideo { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; background: #000; }
  #uploadPreview { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; }
  #arCanvas { position: fixed; inset: 0; z-index: 1; width: 100vw; height: 100vh; touch-action: none; }
  .ui-layer { position: fixed; z-index: 10; pointer-events: none; }
  .ui-layer > * { pointer-events: auto; }
  .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(148,163,184,0.15); }
  .scan-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #38bdf8, transparent); animation: scan 2.5s linear infinite; opacity: 0.6; }
  @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
  .loader { border: 3px solid rgba(56,189,248,0.2); border-top-color: #38bdf8; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .shape-chip { transition: all 0.2s; }
  .shape-chip.active { background: #0ea5e9; color: white; border-color: #0ea5e9; box-shadow: 0 0 12px rgba(14,165,233,0.4); }
  .btn-expand { transition: all 0.3s; }
  .btn-expand.active { background: #f59e0b; color: white; border-color: #f59e0b; }
  .hidden { display: none !important; }
  .fade-up { animation: fadeUp 0.5s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
<base target="_blank">
</head>
<body>

<video id="bgVideo" autoplay playsinline muted webkit-playsinline></video>
<img id="uploadPreview" class="hidden" alt="upload">
<canvas id="arCanvas"></canvas>

<div class="ui-layer top-0 left-0 right-0 p-4">
  <div class="max-w-md mx-auto flex items-center justify-between">
    <div class="glass rounded-xl px-4 py-2 flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center text-white font-bold text-xs">S</div>
      <span class="font-bold text-sm">ShapeLens <span class="text-sky-400">AR</span></span>
    </div>
    <label class="glass rounded-xl px-3 py-2 flex items-center gap-2 text-xs text-slate-300 cursor-pointer">
      <input type="checkbox" id="mockToggle" class="accent-sky-500 w-4 h-4"> モック
    </label>
  </div>
</div>

<div id="cameraLoading" class="ui-layer inset-0 flex flex-col items-center justify-center bg-black/80 z-50">
  <div class="loader mb-3"></div>
  <p class="text-sm text-slate-400">カメラを起動中...</p>
</div>

<div id="cameraFallback" class="ui-layer inset-0 flex flex-col items-center justify-center bg-black/90 z-40 hidden">
  <svg class="w-12 h-12 mb-3 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
  <p class="text-sm text-slate-400 mb-4">カメラが使用できません</p>
  <label class="px-5 py-3 bg-sky-500 text-white font-bold rounded-xl cursor-pointer active:scale-95 transition flex items-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    画像をアップロード
    <input type="file" id="fileInput" accept="image/*" class="hidden" capture="environment">
  </label>
</div>

<div id="captureUI" class="ui-layer inset-0 flex flex-col items-center justify-end pb-24 z-20">
  <div class="scan-line absolute top-1/4 left-0 right-0 hidden" id="scanLine"></div>
  <div id="detectionBadge" class="hidden mb-4 glass px-4 py-2 rounded-full text-sky-400 font-bold text-sm border border-sky-500/30">
    🔍 <span id="detectName">解析中...</span>
  </div>
  <button id="shutterBtn" class="w-16 h-16 rounded-full bg-white/20 backdrop-blur border-4 border-white flex items-center justify-center active:scale-90 transition shadow-lg shadow-sky-500/30">
    <div class="w-12 h-12 rounded-full bg-sky-500"></div>
  </button>
  <p class="text-xs text-white/60 mt-3">物体を中央に合わせてタップ</p>
</div>

<div id="controlPanel" class="ui-layer bottom-0 left-0 right-0 p-4 hidden fade-up">
  <div class="max-w-md mx-auto glass rounded-2xl p-4 space-y-4">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-xs text-slate-400">検出物体</div>
        <div class="font-bold text-sky-400 text-sm" id="detectedObject">--</div>
      </div>
      <div class="flex gap-2">
        <button id="resetBtn" class="px-3 py-1.5 rounded-lg bg-slate-700 text-white text-xs font-bold">リセット</button>
        <button id="screenshotBtn" class="px-3 py-1.5 rounded-lg bg-slate-700 text-white text-xs font-bold">保存</button>
      </div>
    </div>
    <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap active" data-shape="cuboid">直方体</button>
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap" data-shape="cylinder">円柱</button>
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap" data-shape="frustum">円すい台</button>
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap" data-shape="cone">円すい</button>
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap" data-shape="prism">三角柱</button>
      <button class="shape-chip px-3 py-1.5 rounded-full border border-slate-600 bg-slate-800/50 text-xs font-medium text-slate-300 whitespace-nowrap" data-shape="sphere">球</button>
    </div>
    <div class="flex gap-2">
      <button id="btnSolid" class="btn-expand flex-1 py-3 rounded-xl border border-slate-600 bg-slate-800/50 text-sm font-bold text-slate-300 active flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        立体
      </button>
      <button id="btnExpand" class="btn-expand flex-1 py-3 rounded-xl border border-slate-600 bg-slate-800/50 text-sm font-bold text-slate-300 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
        展開
      </button>
    </div>
    <div id="learningTip" class="text-xs bg-sky-900/30 border border-sky-800/50 rounded-lg p-3 text-sky-200 leading-relaxed hidden"></div>
  </div>
</div>

<script>
// ===================== STATE =====================
let stream = null;
let currentShape = 'cuboid';
let detectedLabel = null;
let isExpanded = false;
let useUpload = false;
let uploadedImage = null;
let animProgress = 0;
let targetProgress = 0;

// ===================== THREE.JS =====================
const canvas = document.getElementById('arCanvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 4.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.minDistance = 2;
controls.maxDistance = 12;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
backLight.position.set(-5, 5, -5);
scene.add(backLight);

let shapeGroup = new THREE.Group();
scene.add(shapeGroup);

const shapeColors = {
  cuboid: [0x0ea5e9, 0x38bdf8, 0x7dd3fc, 0xbae6fd, 0xe0f2fe, 0xf0f9ff],
  cylinder: [0x8b5cf6, 0xa78bfa, 0xc4b5fd],
  frustum: [0xf59e0b, 0xfbbf24, 0xfde68a],
  cone: [0xef4444, 0xf87171, 0xfca5a5],
  prism: [0x10b981, 0x34d399, 0x6ee7b7, 0xa7f3d0, 0xd1fae5],
  sphere: [0xec4899, 0xf472b6, 0xfbcfe8]
};

function clearShape() {
  while(shapeGroup.children.length > 0) {
    const child = shapeGroup.children[0];
    if(child.geometry) child.geometry.dispose();
    if(child.material) {
      if(Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
    shapeGroup.remove(child);
  }
}

function addFace(geometry, color, solidPos, solidRot, netPos, netRot, name) {
  const mat = new THREE.MeshStandardMaterial({ 
    color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.92, roughness: 0.3, metalness: 0.1
  });
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.copy(solidPos);
  mesh.rotation.copy(solidRot);
  mesh.userData = {
    solidPos: solidPos.clone(),
    solidRot: solidRot.clone(),
    netPos: netPos.clone(),
    netRot: netRot.clone(),
    name: name
  };
  shapeGroup.add(mesh);
  return mesh;
}

// ===================== 直方体（十字形展開図） =====================
function createCuboid() {
  clearShape();
  const s = 1.2; // size
  const h = s/2;
  const c = shapeColors.cuboid;

  // 立体時の位置と回転、展開図時の位置と回転
  // 展開図：十字形（Z=0平面上）
  //     [上]
  // [左][前][右][後]
  //     [下]

  addFace(new THREE.PlaneGeometry(s,s), c[0], 
    new THREE.Vector3(0,0,h), new THREE.Euler(0,0,0),
    new THREE.Vector3(0,0,0), new THREE.Euler(0,0,0), '前面');

  addFace(new THREE.PlaneGeometry(s,s), c[1],
    new THREE.Vector3(0,0,-h), new THREE.Euler(0,Math.PI,0),
    new THREE.Vector3(s*2,0,0), new THREE.Euler(0,0,0), '後面');

  addFace(new THREE.PlaneGeometry(s,s), c[2],
    new THREE.Vector3(0,h,0), new THREE.Euler(Math.PI/2,0,0),
    new THREE.Vector3(0,s,0), new THREE.Euler(0,0,0), '上面');

  addFace(new THREE.PlaneGeometry(s,s), c[3],
    new THREE.Vector3(0,-h,0), new THREE.Euler(-Math.PI/2,0,0),
    new THREE.Vector3(0,-s,0), new THREE.Euler(0,0,0), '下面');

  addFace(new THREE.PlaneGeometry(s,s), c[4],
    new THREE.Vector3(-h,0,0), new THREE.Euler(0,-Math.PI/2,0),
    new THREE.Vector3(-s,0,0), new THREE.Euler(0,0,0), '左面');

  addFace(new THREE.PlaneGeometry(s,s), c[5],
    new THREE.Vector3(h,0,0), new THREE.Euler(0,Math.PI/2,0),
    new THREE.Vector3(s,0,0), new THREE.Euler(0,0,0), '右面');

  // 中心を調整
  shapeGroup.position.x = -s/2;
}

// ===================== 円柱（上底・下底・側面長方形） =====================
function createCylinder() {
  clearShape();
  const r = 0.6, h = 1.2;
  const c = shapeColors.cylinder;
  const circum = 2 * Math.PI * r; // ≈ 3.77

  // 上底（円）
  addFace(new THREE.CircleGeometry(r, 32), c[0],
    new THREE.Vector3(0, h/2, 0), new THREE.Euler(-Math.PI/2, 0, 0),
    new THREE.Vector3(0, 1.2, 0), new THREE.Euler(0, 0, 0), '上底');

  // 下底（円）
  addFace(new THREE.CircleGeometry(r, 32), c[1],
    new THREE.Vector3(0, -h/2, 0), new THREE.Euler(Math.PI/2, 0, 0),
    new THREE.Vector3(0, -1.2, 0), new THREE.Euler(0, 0, 0), '下底');

  // 側面：立体時は円筒、展開時は長方形（PlaneGeometry）
  // 2つのMeshを作り、progressで切り替える
  const sideSolid = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r, h, 32, 1, true),
    new THREE.MeshStandardMaterial({ color: c[2], side: THREE.DoubleSide, transparent: true, opacity: 0.85 })
  );
  sideSolid.userData = { isSolidSide: true, solidOpacity: 0.85, netOpacity: 0 };
  shapeGroup.add(sideSolid);

  const sideNet = new THREE.Mesh(
    new THREE.PlaneGeometry(circum, h),
    new THREE.MeshStandardMaterial({ color: c[2], side: THREE.DoubleSide, transparent: true, opacity: 0 })
  );
  sideNet.position.set(0, 0, 0);
  sideNet.userData = { isNetSide: true, solidOpacity: 0, netOpacity: 0.85 };
  shapeGroup.add(sideNet);

  // 円筒のワイヤー（立体時のみ表示）
  const wire = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r, h, 32, 1, true),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.15 })
  );
  wire.userData = { isWire: true };
  shapeGroup.add(wire);
}

// ===================== 円すい台 =====================
function createFrustum() {
  clearShape();
  const rTop = 0.4, rBot = 0.7, h = 1.2;
  const c = shapeColors.frustum;

  addFace(new THREE.CircleGeometry(rTop, 32), c[0],
    new THREE.Vector3(0, h/2, 0), new THREE.Euler(-Math.PI/2, 0, 0),
    new THREE.Vector3(0, 1.2, 0), new THREE.Euler(0, 0, 0), '上底');

  addFace(new THREE.CircleGeometry(rBot, 32), c[1],
    new THREE.Vector3(0, -h/2, 0), new THREE.Euler(Math.PI/2, 0, 0),
    new THREE.Vector3(0, -1.2, 0), new THREE.Euler(0, 0, 0), '下底');

  // 側面：立体時は円すい台、展開時は台形（PlaneGeometryで近似）
  const sideSolid = new THREE.Mesh(
    new THREE.CylinderGeometry(rTop, rBot, h, 32, 1, true),
    new THREE.MeshStandardMaterial({ color: c[2], side: THREE.DoubleSide, transparent: true, opacity: 0.85 })
  );
  sideSolid.userData = { isSolidSide: true, solidOpacity: 0.85, netOpacity: 0 };
  shapeGroup.add(sideSolid);

  // 展開時の台形（上底=2πrTop, 下底=2πrBot）
  const topW = 2 * Math.PI * rTop;
  const botW = 2 * Math.PI * rBot;
  const trapShape = new THREE.Shape();
  trapShape.moveTo(-botW/2, -h/2);
  trapShape.lineTo(botW/2, -h/2);
  trapShape.lineTo(topW/2, h/2);
  trapShape.lineTo(-topW/2, h/2);
  trapShape.closePath();
  const trapGeom = new THREE.ShapeGeometry(trapShape);

  const sideNet = new THREE.Mesh(trapGeom,
    new THREE.MeshStandardMaterial({ color: c[2], side: THREE.DoubleSide, transparent: true, opacity: 0 })
  );
  sideNet.position.set(0, 0, 0);
  sideNet.userData = { isNetSide: true, solidOpacity: 0, netOpacity: 0.85 };
  shapeGroup.add(sideNet);
}

// ===================== 円すい =====================
function createCone() {
  clearShape();
  const r = 0.7, h = 1.4;
  const c = shapeColors.cone;

  // 底面（円）
  addFace(new THREE.CircleGeometry(r, 32), c[0],
    new THREE.Vector3(0, -h/2, 0), new THREE.Euler(Math.PI/2, 0, 0),
    new THREE.Vector3(0, -1.2, 0), new THREE.Euler(0, 0, 0), '底面');

  // 側面：立体時は円すい、展開時は扇形
  const sideSolid = new THREE.Mesh(
    new THREE.ConeGeometry(r, h, 32, 1, true),
    new THREE.MeshStandardMaterial({ color: c[1], side: THREE.DoubleSide, transparent: true, opacity: 0.85 })
  );
  sideSolid.userData = { isSolidSide: true, solidOpacity: 0.85, netOpacity: 0 };
  shapeGroup.add(sideSolid);

  // 扇形（展開図）
  const slant = Math.sqrt(r*r + h*h); // 母線の長さ
  const arcLen = 2 * Math.PI * r; // 弧の長さ
  const sectorAngle = arcLen / slant; // 扇形の中心角

  const sectorShape = new THREE.Shape();
  sectorShape.moveTo(0, 0);
  sectorShape.lineTo(slant, 0);
  sectorShape.absarc(0, 0, slant, 0, sectorAngle, false);
  sectorShape.lineTo(0, 0);
  const sectorGeom = new THREE.ShapeGeometry(sectorShape);

  const sideNet = new THREE.Mesh(sectorGeom,
    new THREE.MeshStandardMaterial({ color: c[1], side: THREE.DoubleSide, transparent: true, opacity: 0 })
  );
  sideNet.position.set(0, 0.5, 0);
  sideNet.rotation.z = -sectorAngle/2; // 中心揃え
  sideNet.userData = { isNetSide: true, solidOpacity: 0, netOpacity: 0.85 };
  shapeGroup.add(sideNet);
}

// ===================== 三角柱 =====================
function createPrism() {
  clearShape();
  const r = 0.7, h = 1.2;
  const c = shapeColors.prism;

  // 上底（三角形）
  addFace(new THREE.CircleGeometry(r, 3), c[0],
    new THREE.Vector3(0, h/2, 0), new THREE.Euler(-Math.PI/2, 0, 0),
    new THREE.Vector3(0, 1.2, 0), new THREE.Euler(0, 0, 0), '上底');

  // 下底（三角形）
  addFace(new THREE.CircleGeometry(r, 3), c[1],
    new THREE.Vector3(0, -h/2, 0), new THREE.Euler(Math.PI/2, 0, 0),
    new THREE.Vector3(0, -1.2, 0), new THREE.Euler(0, 0, 0), '下底');

  // 3つの側面（長方形）
  for(let i=0; i<3; i++) {
    const angle = (i / 3) * Math.PI * 2;
    const angleNext = ((i+1) / 3) * Math.PI * 2;
    const x1 = Math.cos(angle)*r, z1 = Math.sin(angle)*r;
    const x2 = Math.cos(angleNext)*r, z2 = Math.sin(angleNext)*r;
    const w = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
    const cx = (x1+x2)/2, cz = (z1+z2)/2;
    const rotY = -Math.atan2(z2-z1, x2-x1) + Math.PI/2;

    addFace(new THREE.PlaneGeometry(w, h), c[2+i],
      new THREE.Vector3(cx, 0, cz), new THREE.Euler(0, rotY, 0),
      new THREE.Vector3((i-1)*1.3, 0, 0), new THREE.Euler(0, 0, 0), `側面${i+1}`);
  }
}

// ===================== 球（展開図不可） =====================
function createSphere() {
  clearShape();
  const r = 0.8;
  const c = shapeColors.sphere;

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 32),
    new THREE.MeshStandardMaterial({ color: c[0], transparent: true, opacity: 0.9, roughness: 0.2 })
  );
  sphere.userData = { isSphere: true };
  shapeGroup.add(sphere);

  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(r, 16, 16),
    new THREE.MeshBasicMaterial({ color: c[1], wireframe: true, transparent: true, opacity: 0.3 })
  );
  wire.userData = { isSphere: true };
  shapeGroup.add(wire);

  // 展開不可メッセージ用のプレート
  const plate = new THREE.Mesh(
    new THREE.PlaneGeometry(2.5, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x1e293b, transparent: true, opacity: 0 })
  );
  plate.position.set(0, -1.2, 0);
  plate.userData = { isTextPlate: true, solidOpacity: 0, netOpacity: 0.9 };
  shapeGroup.add(plate);
}

function generateShape(shape) {
  currentShape = shape;
  switch(shape) {
    case 'cuboid': createCuboid(); break;
    case 'cylinder': createCylinder(); break;
    case 'frustum': createFrustum(); break;
    case 'cone': createCone(); break;
    case 'prism': createPrism(); break;
    case 'sphere': createSphere(); break;
  }
  targetProgress = 0;
  isExpanded = false;
  updateButtonStates();
  updateTip();
}

// ===================== ANIMATION LOOP =====================
function lerpEuler(current, target, alpha) {
  current.x += (target.x - current.x) * alpha;
  current.y += (target.y - current.y) * alpha;
  current.z += (target.z - current.z) * alpha;
}

function animate() {
  requestAnimationFrame(animate);
  const speed = 0.05;

  if (Math.abs(targetProgress - animProgress) > 0.001) {
    animProgress += (targetProgress - animProgress) * speed;
  } else {
    animProgress = targetProgress;
  }

  shapeGroup.children.forEach(child => {
    const u = child.userData;
    if (!u) return;

    // 球は特殊処理
    if (u.isSphere) {
      if (isExpanded) {
        child.rotation.y += 0.01;
        child.material.opacity = 0.3 + (1-animProgress)*0.6;
      } else {
        child.rotation.y += 0.005;
        child.material.opacity = 0.3 + (1-animProgress)*0.6;
      }
      return;
    }

    // テキストプレート（球の展開不可表示）
    if (u.isTextPlate) {
      child.material.opacity = u.solidOpacity + (u.netOpacity - u.solidOpacity) * animProgress;
      return;
    }

    // 立体側面 ↔ 展開側面 の切り替え
    if (u.isSolidSide) {
      child.material.opacity = u.solidOpacity * (1 - animProgress);
      return;
    }
    if (u.isNetSide) {
      child.material.opacity = u.netOpacity * animProgress;
      return;
    }
    if (u.isWire) {
      child.material.opacity = 0.15 * (1 - animProgress);
      return;
    }

    // 通常の面（直方体・三角柱など）
    if (u.solidPos && u.netPos) {
      child.position.lerpVectors(u.solidPos, u.netPos, animProgress);
      lerpEuler(child.rotation, u.netRot, speed);
    }
  });

  // 展開時は自動回転停止、立体時はゆっくり回転
  if (!isExpanded && animProgress < 0.1) {
    shapeGroup.rotation.y += 0.003;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ===================== CAMERA =====================
const video = document.getElementById('bgVideo');
const uploadPreview = document.getElementById('uploadPreview');
const cameraLoading = document.getElementById('cameraLoading');
const cameraFallback = document.getElementById('cameraFallback');
const fileInput = document.getElementById('fileInput');

async function initCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showFallback('ブラウザがカメラをサポートしていません');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, 
      audio: false 
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => { cameraLoading.classList.add('hidden'); video.play(); };
    setTimeout(() => { if (!cameraLoading.classList.contains('hidden')) cameraLoading.classList.add('hidden'); }, 5000);
  } catch (err) {
    let msg = 'カメラを起動できません';
    if (err.name === 'NotAllowedError') msg = 'カメラ権限が拒否されました';
    else if (err.name === 'NotFoundError') msg = 'カメラが見つかりません';
    else if (location.protocol !== 'https:') msg = 'HTTPSが必要です';
    showFallback(msg);
  }
}

function showFallback(msg) {
  cameraLoading.classList.add('hidden');
  cameraFallback.classList.remove('hidden');
  cameraFallback.querySelector('p').textContent = msg;
}

initCamera();

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    uploadedImage = new Image();
    uploadedImage.onload = () => {
      useUpload = true;
      video.classList.add('hidden');
      uploadPreview.src = uploadedImage.src;
      uploadPreview.classList.remove('hidden');
      cameraFallback.classList.add('hidden');
      cameraLoading.classList.add('hidden');
    };
    uploadedImage.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

// ===================== DETECTION =====================
const shapeMap = {
  bottle: { shape: 'cylinder', name: 'ペットボトル', reason: '側面が円筒状で、上面と下面が平行な円であるため' },
  cup: { shape: 'frustum', name: 'コップ', reason: '上面の直径が下面より大きく、円すい台として近似できるため' },
  book: { shape: 'cuboid', name: '本', reason: '6つの面がすべて長方形で、対辺が平行であるため' },
  chair: { shape: 'cuboid', name: '椅子', reason: '座面と脚が直方体の組み合わせとして表現できるため' },
  'cell phone': { shape: 'cuboid', name: 'スマートフォン', reason: '薄い直方体の形状をしているため' },
  bowl: { shape: 'frustum', name: 'ボウル', reason: '半球に近い形状だが、円すい台として近似可能なため' },
  orange: { shape: 'sphere', name: 'オレンジ', reason: 'どの方向から見ても円形に近いため' },
  banana: { shape: 'prism', name: 'バナナ', reason: '三角柱に近い断面形状を持つため' }
};

const shapeData = {
  cuboid: { label: '直方体', faces: 6 },
  cylinder: { label: '円柱', faces: 3 },
  frustum: { label: '円すい台', faces: 3 },
  cone: { label: '円すい', faces: 2 },
  prism: { label: '三角柱', faces: 5 },
  sphere: { label: '球', faces: 1 }
};

document.getElementById('shutterBtn').addEventListener('click', async () => {
  const isMock = document.getElementById('mockToggle').checked;
  const scanLine = document.getElementById('scanLine');
  const badge = document.getElementById('detectionBadge');
  const detectName = document.getElementById('detectName');

  scanLine.classList.remove('hidden');
  document.getElementById('shutterBtn').classList.add('opacity-50');
  await new Promise(r => setTimeout(r, 1000));

  let result;
  if (isMock) {
    const keys = Object.keys(shapeMap);
    result = shapeMap[keys[Math.floor(Math.random() * keys.length)]];
  } else {
    result = shapeMap.cup;
  }

  detectedLabel = result;
  currentShape = result.shape;

  scanLine.classList.add('hidden');
  badge.classList.remove('hidden');
  detectName.textContent = result.name + ' を検出';

  document.getElementById('captureUI').classList.add('hidden');
  document.getElementById('controlPanel').classList.remove('hidden');
  document.getElementById('detectedObject').textContent = result.name;

  document.querySelectorAll('.shape-chip').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-shape="${currentShape}"]`).classList.add('active');

  generateShape(currentShape);
});

// ===================== UI CONTROLS =====================
function updateButtonStates() {
  const btnSolid = document.getElementById('btnSolid');
  const btnExpand = document.getElementById('btnExpand');
  if (isExpanded) {
    btnSolid.classList.remove('active');
    btnExpand.classList.add('active');
  } else {
    btnSolid.classList.add('active');
    btnExpand.classList.remove('active');
  }
}

function updateTip() {
  const tip = document.getElementById('learningTip');
  const info = shapeData[currentShape];
  const reason = detectedLabel?.reason || `${info.label}の特徴（面数: ${info.faces}）に近似されます`;
  tip.innerHTML = `<strong>学習モード：</strong>この物体は<strong>${info.label}</strong>として近似されました。<br>理由：${reason}`;
  tip.classList.remove('hidden');
}

document.querySelectorAll('.shape-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    generateShape(btn.dataset.shape);
  });
});

document.getElementById('btnSolid').addEventListener('click', () => {
  isExpanded = false;
  targetProgress = 0;
  updateButtonStates();
});

document.getElementById('btnExpand').addEventListener('click', () => {
  isExpanded = true;
  targetProgress = 1;
  updateButtonStates();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('captureUI').classList.remove('hidden');
  document.getElementById('controlPanel').classList.add('hidden');
  document.getElementById('detectionBadge').classList.add('hidden');
  document.getElementById('shutterBtn').classList.remove('opacity-50');
  clearShape();
  if (useUpload) {
    useUpload = false;
    uploadedImage = null;
    uploadPreview.classList.add('hidden');
    video.classList.remove('hidden');
    fileInput.value = '';
  }
});

document.getElementById('screenshotBtn').addEventListener('click', () => {
  renderer.render(scene, camera);
  const dataURL = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = `shapelens-ar-${currentShape}-${Date.now()}.png`;
  a.click();
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
